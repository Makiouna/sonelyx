document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

acing:.08em; color:#86868b;\">{{ e.catLabel }}<\u002Fspan>\n                    <span style=\"font-size:13px; font-weight:600; color:#0071e3;\">Voir ›<\u002Fspan>\n                  <\u002Fdiv>\n                  <h3 style=\"font-weight:700; font-size:20px; letter-spacing:-.02em; margin:0 0 8px;\">{{ e.name }}<\u002Fh3>\n                  <p style=\"font-size:14px; line-height:1.5; color:#6e6e73; margin:0;\">{{ e.desc }}<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n                  <sc-for list=\"{{ e.specs }}\" as=\"s\" hint-placeholder-count=\"3\">\n                    <span style=\"padding:6px 12px; border-radius:8px; background:#f5f5f7; font-size:12px; font-weight:600; color:#424245;\">{{ s }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"margin-top:auto; padding-top:16px; border-top:1px solid rgba(0,0,0,.08); display:flex; align-items:center; justify-content:space-between; gap:10px;\">\n                  <span style=\"font-size:13px; font-weight:600; color:#6e6e73;\">Tarif sur devis<\u002Fspan>\n                  <button onclick=\"{{ e.toggle }}\" style=\"{{ e.btnStyle }}\">{{ e.btnLabel }}<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center; padding:70px 20px; background:#fff; border-radius:22px; border:1px solid rgba(0,0,0,.05);\">\n          <div style=\"font-weight:700; font-size:20px; margin-bottom:8px;\">Aucun résultat<\u002Fdiv>\n          <p style=\"font-size:15px; color:#6e6e73; margin:0 0 22px;\">Aucun matériel ne correspond à votre recherche.<\u002Fp>\n          <button onclick=\"{{ resetSearch }}\" style=\"padding:11px 22px; border-radius:980px; border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600; background:#1d1d1f; color:#fff;\">Réinitialiser<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== INCLUS ===== -->\n  <section style=\"background:#fff; padding:clamp(70px,9vw,120px) clamp(20px,4vw,40px);\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"text-align:center; max-width:660px; margin:0 auto clamp(40px,5vw,56px);\">\n        <div style=\"font-size:14px; font-weight:600; color:#86868b; margin-bottom:16px;\">INCLUS DANS CHAQUE LOCATION<\u002Fdiv>\n        <h2 style=\"font-weight:800; font-size:clamp(28px,4.4vw,48px); line-height:1.07; letter-spacing:-.03em; margin:0;\">Louez l'esprit tranquille.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px;\">\n        <sc-for list=\"{{ included }}\" as=\"i\" hint-placeholder-count=\"4\">\n          <div style=\"background:#f5f5f7; border-radius:20px; padding:32px 28px; min-height:180px; display:flex; flex-direction:column; justify-content:space-between;\">\n            <div style=\"font-weight:800; font-size:15px; color:#0071e3;\">{{ i.tag }}<\u002Fdiv>\n            <div>\n              <h3 style=\"font-weight:700; font-size:19px; letter-spacing:-.02em; margin:0 0 8px;\">{{ i.title }}<\u002Fh3>\n              <p style=\"font-size:14px; line-height:1.55; color:#6e6e73; margin:0;\">{{ i.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== MÉTHODE ===== -->\n  <section id=\"methode\" style=\"background:#f5f5f7; padding:clamp(70px,9vw,120px) clamp(20px,4vw,40px);\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"text-align:center; max-width:660px; margin:0 auto clamp(40px,5vw,56px);\">\n        <div style=\"font-size:14px; font-weight:600; color:#86868b; margin-bottom:16px;\">COMMENT ÇA MARCHE<\u002Fdiv>\n        <h2 style=\"font-weight:800; font-size:clamp(28px,4.4vw,48px); line-height:1.07; letter-spacing:-.03em; margin:0;\">De la sélection au retour.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px;\">\n        <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff; border-radius:20px; padding:32px 28px; border:1px solid rgba(0,0,0,.04); min-height:200px; display:flex; flex-direction:column;\">\n            <div style=\"font-weight:800; font-size:15px; color:#0071e3; margin-bottom:auto;\">{{ s.no }}<\u002Fdiv>\n            <h3 style=\"font-weight:700; font-size:19px; letter-spacing:-.02em; margin:24px 0 10px;\">{{ s.title }}<\u002Fh3>\n            <p style=\"font-size:14px; line-height:1.55; color:#6e6e73; margin:0;\">{{ s.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CTA ===== -->\n  <section id=\"contact\" style=\"background:#fff; text-align:center; padding:clamp(90px,12vw,160px) clamp(20px,4vw,40px);\">\n    <div style=\"max-width:780px; margin:0 auto;\">\n      <h2 style=\"font-weight:800; font-size:clamp(36px,6vw,76px); line-height:1.03; letter-spacing:-.035em; margin:0 0 22px;\">Prêt à réserver votre matériel ?<\u002Fh2>\n      <p style=\"font-size:clamp(17px,1.8vw,20px); color:#6e6e73; max-width:480px; margin:0 auto 38px; line-height:1.5;\">Composez votre sélection, on vous renvoie un devis sur-mesure sous 24h.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:14px 26px; justify-content:center; align-items:center;\">\n        <a href=\"#catalogue\" style=\"display:inline-flex; align-items:center; padding:16px 34px; border-radius:980px; background:#1d1d1f; color:#fff; text-decoration:none; font-weight:600; font-size:17px; transition:background .25s, transform .15s;\" style-hover=\"background:#000; transform:translateY(-1px);\">Composer ma sélection<\u002Fa>\n        <a href=\"mailto:contact@sonelyx.fr\" style=\"display:inline-flex; align-items:center; gap:5px; color:#0071e3; text-decoration:none; font-weight:600; font-size:17px;\" style-hover=\"text-decoration:underline;\">contact@sonelyx.fr ›<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background:#f5f5f7; border-top:1px solid rgba(0,0,0,.07); color:#6e6e73;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:clamp(54px,6vw,80px) clamp(20px,4vw,40px) 30px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:40px 30px;\">\n        <div style=\"min-width:220px;\">\n          <div style=\"font-weight:700; font-size:22px; letter-spacing:-.02em; color:#1d1d1f; margin-bottom:14px;\">Sonelyx<\u002Fdiv>\n          <p style=\"font-size:14px; line-height:1.6; max-width:280px; margin:0 0 22px;\">Prestation technique &amp; location de matériel événementiel professionnel.<\u002Fp>\n          <a href=\"#contact\" style=\"display:inline-flex; align-items:center; padding:11px 22px; border-radius:980px; background:#1d1d1f; color:#fff; text-decoration:none; font-weight:600; font-size:14px; transition:background .25s;\" style-hover=\"background:#000;\">Demander un devis<\u002Fa>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px; font-weight:700; color:#1d1d1f; margin-bottom:16px;\">Catégories<\u002Fdiv>\n          <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:12px; font-size:14px;\">\n            <li><a href=\"#catalogue\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Diffusion / Line-array<\u002Fa><\u002Fli>\n            <li><a href=\"#catalogue\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Éclairage scénique<\u002Fa><\u002Fli>\n            <li><a href=\"#catalogue\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Régie &amp; contrôle<\u002Fa><\u002Fli>\n            <li><a href=\"#catalogue\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Structure &amp; énergie<\u002Fa><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px; font-weight:700; color:#1d1d1f; margin-bottom:16px;\">Sonelyx<\u002Fdiv>\n          <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:12px; font-size:14px;\">\n            <li><a href=\"Sonelyx.dc.html\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Accueil<\u002Fa><\u002Fli>\n            <li><a href=\"Sonelyx.dc.html#metiers\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Prestation technique<\u002Fa><\u002Fli>\n            <li><a href=\"Sonelyx.dc.html#fiabilite\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Fiabilité<\u002Fa><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px; font-weight:700; color:#1d1d1f; margin-bottom:16px;\">Contact<\u002Fdiv>\n          <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:12px; font-size:14px;\">\n            <li><a href=\"mailto:contact@sonelyx.fr\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">contact@sonelyx.fr<\u002Fa><\u002Fli>\n            <li><a href=\"tel:+33000000000\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">+33 (0)0 00 00 00 00<\u002Fa><\u002Fli>\n            <li><a href=\"#\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Instagram<\u002Fa><\u002Fli>\n            <li><a href=\"#\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">LinkedIn<\u002Fa><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px; margin-top:clamp(44px,5vw,68px); padding-top:24px; border-top:1px solid rgba(0,0,0,.09); font-size:13px;\">\n        <div>© 2026 Sonelyx. Tous droits réservés.<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:24px;\">\n          <a href=\"#\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Mentions légales<\u002Fa>\n          <a href=\"#\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">CGV<\u002Fa>\n          <a href=\"#\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#1d1d1f;\">Confidentialité<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ===== FLOATING QUOTE BAR ===== -->\n  <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; left:50%; bottom:24px; transform:translateX(-50%); z-index:70; display:flex; align-items:center; gap:16px; padding:11px 11px 11px 22px; border-radius:980px; background:rgba(29,29,31,.92); backdrop-filter:blur(16px); box-shadow:0 20px 54px -18px rgba(0,0,0,.6); color:#fff; max-width:calc(100vw - 32px); animation:barUp .35s cubic-bezier(.22,1,.36,1);\">\n      <span style=\"font-size:14px; font-weight:600; white-space:nowrap;\">{{ selectionLabel }}<\u002Fspan>\n      <a href=\"#contact\" style=\"display:inline-flex; align-items:center; padding:10px 22px; border-radius:980px; background:#fff; color:#1d1d1f; text-decoration:none; font-weight:600; font-size:14px; white-space:nowrap; transition:transform .15s;\" style-hover=\"transform:translateY(-1px);\">Demander un devis<\u002Fa>\n      <button onclick=\"{{ clearSelection }}\" style=\"background:none; border:none; cursor:pointer; color:rgba(255,255,255,.6); font-size:13px; font-weight:500; padding:6px; font-family:inherit; transition:color .2s;\" style-hover=\"color:#fff;\">Effacer<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = { filter: 'all', query: '', selected: {}, catalogue: null };\n\n  included = [\n    { tag: 'Qualité', title: 'Matériel testé & calibré', desc: 'Chaque équipement est contrôlé et étiqueté avant chaque départ.' },\n    { tag: 'Logistique', title: 'Livraison & installation', desc: 'Avec ou sans technicien, partout en région — montage inclus en option.' },\n    { tag: 'Support', title: 'Assistance technique', desc: 'Une hotline dédiée joignable avant et pendant votre événement.' },\n    { tag: 'Sérénité', title: 'Remplacement garanti', desc: 'Matériel de secours et remplacement rapide en cas d\\u2019incident.' }\n  ];\n\n  steps = [\n    { no: '01', title: 'Sélection', desc: 'Composez votre liste de matériel directement depuis le catalogue.' },\n    { no: '02', title: 'Devis sous 24h', desc: '\\u00c9tude de faisabilit\\u00e9 et tarif sur-mesure adapt\\u00e9 \\u00e0 votre \\u00e9v\\u00e9nement.' },\n    { no: '03', title: 'Livraison ou retrait', desc: 'Mise \\u00e0 disposition avec ou sans technicien, install possible sur site.' },\n    { no: '04', title: 'Retour', desc: 'Reprise du mat\\u00e9riel et contr\\u00f4le complet apr\\u00e8s votre \\u00e9v\\u00e9nement.' }\n  ];\n\n  CATALOGUE = [\n    { id: 'line-array-k-series', cat: 'diffusion', catLabel: 'DIFFUSION', brand: 'L-Acoustics', name: 'Line-Array K-Series', desc: 'Système de référence pour grandes jauges et festivals.', specs: ['138 dB SPL', '25 Hz–20 kHz', 'Line-array'] },\n    { id: 'subwoofer-sl-series', cat: 'diffusion', catLabel: 'DIFFUSION', brand: 'd&b audiotechnik', name: 'Subwoofer SL-Series', desc: 'Renfort de graves directif, sans débordement sur scène.', specs: ['Cardioïde', 'Infrabasses', 'Calibré'] },\n    { id: 'point-source-geo', cat: 'diffusion', catLabel: 'DIFFUSION', brand: 'NEXO', name: 'Point-Source Geo', desc: 'Diffusion de proximité haute définition pour salles et clubs.', specs: ['Point-source', 'Compact', 'Haute déf.'] },\n    { id: 'retours-x-series', cat: 'diffusion', catLabel: 'DIFFUSION', brand: 'L-Acoustics', name: 'Retours de scène X-Series', desc: 'Wedges de monitoring pour le confort des artistes.', specs: ['Monitoring', 'Coaxial', 'Scène'] },\n    { id: 'lyre-bmfl', cat: 'eclairage', catLabel: 'ÉCLAIRAGE', brand: 'Robe', name: 'Lyre Asservie BMFL', desc: 'Spot motorisé haute puissance pour faisceaux nets et précis.', specs: ['Spot', 'CMY', 'Zoom 5–55°'] },\n    { id: 'wash-led-full-spectrum', cat: 'eclairage', catLabel: 'ÉCLAIRAGE', brand: 'Martin', name: 'Wash LED Full-Spectrum', desc: 'Nappes de couleur homogènes, plein spectre.', specs: ['RGBW', '16-bit', 'LED'] },\n    { id: 'barre-led-pixel', cat: 'eclairage', catLabel: 'ÉCLAIRAGE', brand: 'GLP', name: 'Barre LED Pixel', desc: 'Effets graphiques rythmés et pixel mapping.', specs: ['Pixel mapping', 'LED', 'Strobe'] },\n    { id: 'hazer-brouillard', cat: 'eclairage', catLabel: 'ÉCLAIRAGE', brand: 'MDG', name: 'Hazer / Brouillard', desc: 'Révèle les faisceaux, atmosphère maîtrisée.', specs: ['Hazer', 'Faible densité', 'DMX'] },\n    { id: 'regie-cdj-3000', cat: 'regie', catLabel: 'RÉGIE', brand: 'Pioneer DJ', name: 'Régie CDJ-3000', desc: 'Régie DJ standard club, prête pour tout artiste.', specs: ['2× CDJ-3000', 'DJM-A9', 'Pro DJ'] },\n    { id: 'console-dlive-s', cat: 'regie', catLabel: 'RÉGIE', brand: 'Allen & Heath', name: 'Console dLive S-Class', desc: 'Mixage numérique pour grandes productions live.', specs: ['128 entrées', '96 kHz', 'Numérique'] },\n    { id: 'console-magicq', cat: 'regie', catLabel: 'RÉGIE', brand: 'ChamSys', name: 'Console Lumière MagicQ', desc: 'Pilotage lumière complet, shows programmés au cue.', specs: ['DMX', 'Timeline', 'Cues'] },\n    { id: 'micros-axient', cat: 'regie', catLabel: 'RÉGIE', brand: 'Shure', name: 'Micros HF Axient Digital', desc: 'Liaisons HF fiables, large bande, anti-brouillage.', specs: ['UHF', 'Numérique', 'Diversity'] },\n    { id: 'pont-truss', cat: 'structure', catLabel: 'STRUCTURE', brand: 'Prolyte', name: 'Pont aluminium (truss)', desc: 'Structures de portée pour accroche son et lumière.', specs: ['Alu', 'Charge calculée', 'Modulaire'] },\n    { id: 'levage-mat', cat: 'structure', catLabel: 'STRUCTURE', brand: 'GIS', name: 'Levage / mât télescopique', desc: 'Élévation sécurisée des structures et line-array.', specs: ['Levage', 'Sécurisé', 'Réglable'] },\n    { id: 'armoire-distribution', cat: 'energie', catLabel: 'ÉNERGIE', brand: 'Power Dist.', name: 'Armoire de distribution', desc: 'Distribution électrique sécurisée et protégée.', specs: ['Triphasé', 'Protégé', 'Différentiel'] },\n    { id: 'groupe-electrogene', cat: 'energie', catLabel: 'ÉNERGIE', brand: 'Power Gen.', name: 'Groupe électrogène insonorisé', desc: 'Autonomie énergétique pour sites non équipés.', specs: ['Insonorisé', 'Autonome', 'Pro'] }\n  ];\n\n  componentDidMount() {\n    const STORE = 'sonelyx_devis';\n    this.mod = {\n      saveSelection: (o) => { try { localStorage.setItem(STORE, JSON.stringify(o || {})); } catch (e) {} },\n      loadSelection: () => { try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch (e) { return {}; } }\n    };\n    this.setState({ catalogue: this.CATALOGUE, selected: this.mod.loadSelection() });\n  }\n\n  persist(next) {\n    if (this.mod) this.mod.saveSelection(next);\n  }\n\n  renderVals() {\n    const cat = this.state.catalogue || [];\n    const f = this.state.filter;\n    const q = this.state.query.trim().toLowerCase();\n    const sel = this.state.selected;\n\n    const matches = cat.filter(e => {\n      if (f !== 'all' && e.cat !== f) return false;\n      if (!q) return true;\n      const hay = (e.name + ' ' + e.brand + ' ' + e.desc + ' ' + e.catLabel + ' ' + e.specs.join(' ')).toLowerCase();\n      return hay.includes(q);\n    });\n\n    const items = matches.map(e => {\n      const on = !!sel[e.id];\n      return {\n        ...e,\n        cardBorder: on ? 'rgba(0,113,227,.5)' : 'rgba(0,0,0,.09)',\n        btnLabel: on ? '\\u2713 Ajouté' : '+ Ajouter',\n        btnStyle: {\n          padding: '9px 16px', borderRadius: '980px', border: 'none', cursor: 'pointer',\n          fontFamily: 'inherit', fontSize: '13px', fontWeight: 600, transition: 'all .2s', whiteSpace: 'nowrap',\n          background: on ? '#e8f1fd' : '#1d1d1f',\n          color: on ? '#0071e3' : '#fff'\n        },\n        toggle: (ev) => {\n          ev.preventDefault();\n          this.setState(s => {\n            const next = { ...s.selected };\n            if (next[e.id]) delete next[e.id]; else next[e.id] = true;\n            this.persist(next);\n            return { selected: next };\n          });\n        }\n      };\n    });\n\n    const filterDefs = [\n      { key: 'all', label: 'Tout' },\n      { key: 'diffusion', label: 'Diffusion' },\n      { key: 'eclairage', label: '\\u00c9clairage' },\n      { key: 'regie', label: 'R\\u00e9gie' },\n      { key: 'structure', label: 'Structure' },\n      { key: 'energie', label: '\\u00c9nergie' }\n    ];\n    const filters = filterDefs.map(d => {\n      const on = d.key === f;\n      return {\n        label: d.label,\n        onClick: () => this.setState({ filter: d.key }),\n        style: {\n          padding: '9px 16px', borderRadius: '980px', border: 'none', cursor: 'pointer',\n          fontFamily: 'inherit', fontSize: '13px', fontWeight: 600, transition: 'all .25s', whiteSpace: 'nowrap',\n          background: on ? '#1d1d1f' : 'transparent',\n          color: on ? '#fff' : '#6e6e73'\n        }\n      };\n    });\n\n    const loaded = this.state.catalogue !== null;\n    const count = Object.keys(sel).length;\n    const selectionLabel = count + ' article' + (count > 1 ? 's' : '') + ' sélectionné' + (count > 1 ? 's' : '');\n\n    return {\n      items,\n      filters,\n      query: this.state.query,\n      onSearch: (ev) => this.setState({ query: ev.target.value }),\n      resetSearch: () => this.setState({ query: '', filter: 'all' }),\n      hasResults: items.length > 0,\n      noResults: loaded && items.length === 0,\n      included: this.included,\n      steps: this.steps,\n      catalogueCount: cat.length || 16,\n      hasSelection: count > 0,\n      selectionLabel,\n      clearSelection: () => { this.persist({}); this.setState({ selected: {} }); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
